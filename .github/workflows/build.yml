name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Build CLI
        run: cargo build --release

      - name: Build CLI + GUI
        run: cargo build --release --features gui

      - name: Upload CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: ResidentSpecter-windows-cli
          path: target/release/resident-specter.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install GUI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            libfontconfig1-dev

      - name: Build CLI
        run: cargo build --release

      - name: Build CLI + GUI
        run: cargo build --release --features gui

      - name: Upload CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: ResidentSpecter-linux-cli
          path: target/release/resident-specter
