name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Build CLI + GUI
        run: cargo build --release --features gui

      - name: Rename binary
        run: |
          cp target/release/resident-reaper.exe ResidentReaper.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: ResidentReaper.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-zigbuild and zig
        run: |
          pip3 install ziglang
          cargo install cargo-zigbuild
          rustup target add x86_64-unknown-linux-gnu

      - name: Build CLI (glibc 2.17 compatible)
        run: cargo zigbuild --release --features cli --target x86_64-unknown-linux-gnu.2.17

      - name: Rename binary
        run: |
          cp target/x86_64-unknown-linux-gnu/release/resident-reaper ResidentReaper

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: ResidentReaper

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: windows-binary
          path: artifacts/windows

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: linux-binary
          path: artifacts/linux

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/windows/ResidentReaper.exe
            artifacts/linux/ResidentReaper
